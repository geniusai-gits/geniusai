<!DOCTYPE html>
<html>
<head>
    <title>Buat Chatbot</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Buat Chatbot Baru</h2>

    <form method="POST">
        <label>Nama Chatbot</label>
        <input type="text" name="nama_chatbot" placeholder="Contoh: CS Toko Online" required>

        <button type="submit">Lanjut</button>
    </form>

    <a href="/auth/dashboard" class="back">← Kembali ke Dashboard</a>
</div>

</body>
</html>
