<!doctype html>
<html>
  <head>
    <title>Detail Chatbot</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
      }

      .container {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
      }

      label {
        font-weight: 500;
        display: block;
        margin-bottom: 5px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 20px;
        font-size: 14px;
        transition: 0.2s;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border: 1px solid #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .full {
        grid-column: span 2;
      }

      /* Upload Box */
      .upload-box {
        border: 2px dashed #bbb;
        padding: 25px;
        text-align: center;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        background: #fafafa;
      }

      .upload-box:hover {
        border-color: #007bff;
        background: #f0f6ff;
        transform: scale(1.02);
      }

      button {
        width: 100%;
        padding: 14px;
        background: #007bff;
        border: none;
        color: white;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .progress {
        height: 6px;
        background: #e0e0e0;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .progress-bar {
        height: 100%;
        width: 80%;
        background: #007bff;
        border-radius: 5px;
      }

      .note {
        text-align: center;
        font-size: 13px;
        color: #666;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>⚙️ Detail Chatbot</h2>

      <div class="progress">
        <div class="progress-bar"></div>
      </div>

      <form method="POST" enctype="multipart/form-data">
        <div class="grid">
          <div>
            <label>Nama Usaha</label>
            <input type="text" name="nama_usaha" required />
          </div>

          <div>
            <label>Persona</label>
            <input
              type="text"
              name="persona"
              placeholder="Contoh: Ramah, Profesional"
            />
          </div>

          <div class="full">
            <label>Deskripsi Usaha</label>
            <textarea name="deskripsi_usaha" required></textarea>
          </div>

          <div class="full">
            <label>Alur Usaha</label>
            <textarea name="alur_usaha"></textarea>
          </div>

          <div class="full">
            <label>Tujuan Chatbot</label>
            <textarea name="tujuan_chatbot"></textarea>
          </div>

          <div class="full">
            <label>Batasan Behavior</label>
            <textarea name="batasan_behavior"></textarea>
          </div>

          <!-- 🔥 Upload File -->
          <div class="full">
            <label>Upload Knowledge File</label>

            <div
              class="upload-box"
              onclick="document.getElementById('fileInput').click()"
            >
              <div style="font-size: 30px">📁</div>
              <div>Klik untuk upload file</div>
              <span id="fileName" style="font-size: 13px; color: #666"
                >Belum ada file</span
              >
            </div>

            <input type="file" id="fileInput" name="file_knowledge" hidden />
          </div>
        </div>

        <button type="submit">🚀 Simpan & Aktifkan Chatbot</button>

        <p class="note">Chatbot akan otomatis aktif setelah disimpan</p>
      </form>
    </div>

    <script>
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");

      fileInput.addEventListener("change", function () {
        if (this.files.length > 0) {
          fileName.innerText = "✅ " + this.files[0].name;
          fileName.style.color = "green";
        } else {
          fileName.innerText = "Belum ada file";
          fileName.style.color = "#666";
        }
      });
    </script>
  </body>
</html>
