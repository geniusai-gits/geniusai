<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <style>
      body {
        font-family: "Segoe UI";
        background: #f4f6f8;
      }
      .navbar {
        background: #007bff;
        padding: 15px;
        color: white;
      }
      .container {
        padding: 20px;
      }
      .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .card a {
        display: inline-block;
        margin-top: 10px;
        background: #007bff;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
      }
      .btn {
        background: #28a745;
        padding: 10px 15px;
        color: white;
        border-radius: 6px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <h2>Dashboard Chatbot 🤖</h2>
    </div>

    <div class="container">
      <a href="/auth/create-chatbot">+ Buat Chatbot</a>

      <h3>Chatbot Saya</h3>

      {% for chatbot in chatbots %}
      <div class="card">
        <h3>{{ chatbot.nama_chatbot }}</h3>
        <a href="/auth/chat/{{ chatbot.chatbot_id }}">Chat</a>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
