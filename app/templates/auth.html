<!DOCTYPE html>
<html>
<head>
    <title>Auth Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .switch {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Login</h2>
        <form action="/auth/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="switch" onclick="toggle()">Belum punya akun? Register</div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">
        <h2>Register</h2>
        <form action="/auth/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="switch" onclick="toggle()">Sudah punya akun? Login</div>
    </div>

</div>

<script>
function toggle() {
    let login = document.getElementById("loginForm");
    let register = document.getElementById("registerForm");

    if (login.style.display === "none") {
        login.style.display = "block";
        register.style.display = "none";
    } else {
        login.style.display = "none";
        register.style.display = "block";
    }
}
</script>

</body>
</html>
