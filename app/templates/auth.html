<!doctype html>
<html>
  <head>
    <title>Auth Page</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      h2 {
        text-align: center;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #007bff;
      }
      .switch {
        text-align: center;
        margin-top: 10px;
        color: #007bff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LOGIN -->
      <div id="loginForm">
        <h2>Login</h2>
        <form action="/auth/login" method="POST">
          <input type="text" name="username" placeholder="Username" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>
        <div class="switch" onclick="toggle()">Belum punya akun? Register</div>
      </div>

      <!-- REGISTER -->
      <div id="registerForm" style="display: none">
        <h2>Register</h2>
        <form action="/auth/register" method="POST">
          <input type="text" name="username" placeholder="Username" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Register</button>
        </form>
        <div class="switch" onclick="toggle()">Sudah punya akun? Login</div>
      </div>
    </div>

    <script>
      function toggle() {
        let login = document.getElementById("loginForm");
        let register = document.getElementById("registerForm");

        if (login.style.display === "none") {
          login.style.display = "block";
          register.style.display = "none";
        } else {
          login.style.display = "none";
          register.style.display = "block";
        }
      }
    </script>
  </body>
</html>
