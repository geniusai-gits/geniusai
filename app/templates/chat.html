<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: "Segoe UI";
        background: #f4f6f8;
      }
      .chat-box {
        width: 500px;
        margin: 20px auto;
        background: white;
        border-radius: 10px;
        padding: 15px;
        height: 450px;
        overflow-y: auto;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .message {
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        max-width: 70%;
      }
      .user {
        background: #007bff;
        color: white;
        margin-left: auto;
      }
      .bot {
        background: #e9ecef;
      }
      .input-box {
        width: 500px;
        margin: auto;
        display: flex;
      }
      input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }
      button {
        padding: 12px;
        margin-left: 5px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h2 align="center">Chatbot</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-box">
      <input type="text" id="message" placeholder="Ketik pesan..." />
      <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
      const chatbot_id = {{ chatbot_id }};
    </script>

    <script>
      document
        .getElementById("message")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            e.preventDefault(); // biar gak reload
            sendMessage();
          }
        });
      function sendMessage() {
        let message = document.getElementById("message").value.trim();

        if (!message) return; // cegah kosong

        fetch("/auth/send-message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: message,
            chatbot_id: chatbot_id,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            let chatBox = document.getElementById("chatBox");

            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            chatBox.innerHTML += `<div class="message bot">${data.reply}</div>`;

            document.getElementById("message").value = "";

            // auto scroll ke bawah
            chatBox.scrollTop = chatBox.scrollHeight;
          });
      }
    </script>
  </body>
</html>
